<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Astira — AI Planet Generator | Planet-Only NFT Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap');

    body {
      font-family: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
      background: #03050b;
      color: #f0f3fc;
      overflow: hidden;
      position: relative;
    }

    .cosmic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      animation: starDrift 80s linear infinite;
    }
    .star {
      position: absolute;
      background: rgba(255, 240, 200, 0.8);
      border-radius: 50%;
      box-shadow: 0 0 6px #fff8e0;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 1; transform: scale(1.2);}
    }
    @keyframes starDrift {
      0% { transform: translate(0, 0);}
      100% { transform: translate(-5%, -5%);}
    }

    .orbiting-planet {
      position: absolute;
      border-radius: 50%;
      filter: blur(2px);
      opacity: 0.25;
      animation: floatPlanet 25s infinite ease-in-out;
    }
    @keyframes floatPlanet {
      0% { transform: translate(0, 0) scale(1);}
      50% { transform: translate(3%, 2%) scale(1.02);}
      100% { transform: translate(0, 0) scale(1);}
    }

    .planet-1 { width: 180px; height: 180px; background: radial-gradient(circle at 30% 30%, #ffb347, #8b4513); top: 15%; left: -60px; box-shadow: 0 0 40px #ffae42; animation-duration: 40s; }
    .planet-2 { width: 260px; height: 260px; background: radial-gradient(circle at 40% 60%, #6a9eff, #1b3b6b); bottom: -80px; right: -70px; opacity: 0.2; filter: blur(8px); animation-duration: 55s; }
    .planet-3 { width: 120px; height: 120px; background: radial-gradient(circle, #bd7acf, #4a2a6b); top: 60%; left: 70%; opacity: 0.3; filter: blur(3px); animation-duration: 30s; }
    .nebula {
      position: absolute;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(80,150,255,0.08), transparent);
      border-radius: 50%;
      top: 20%;
      left: 50%;
      filter: blur(60px);
      animation: nebulaPulse 18s infinite alternate;
    }
    @keyframes nebulaPulse {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 0.5; transform: scale(1.2);}
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(8, 12, 24, 0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(110, 210, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 1100;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      font-family: 'Orbitron', monospace;
    }

    .hamburger {
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
      color: #9adcff;
      transition: 0.2s;
      width: 44px;
      height: 44px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hamburger:hover {
      background: rgba(154, 220, 255, 0.2);
      text-shadow: 0 0 6px #6bc2ff;
      transform: scale(1.02);
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 2px;
    }
    .logo-astira {
      background: linear-gradient(135deg, #e0f0ff, #89c9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px #2f8eff60;
    }
    .logo-diamond {
      color: #6bc2ff;
      font-size: 1.6rem;
      font-weight: 400;
    }
    .logo-ai {
      background: linear-gradient(135deg, #ffffff, #b3dbff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .right-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .connect-wallet-btn {
      background: linear-gradient(105deg, #1a4f6e, #0f3850);
      border: 1px solid #6bc2ff;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Space Grotesk', sans-serif;
      white-space: nowrap;
    }
    .connect-wallet-btn:hover {
      background: #2a6ca3;
      transform: scale(1.02);
      box-shadow: 0 0 12px #4fa2e0;
    }

    .profile-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(145deg, #16212e, #09101c);
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border: 1px solid #6bc2ff;
      cursor: pointer;
      transition: 0.2s;
    }
    .profile-icon:hover {
      border-color: #aafff0;
      box-shadow: 0 0 10px #4fa2e0;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 270px;
      background: rgba(3, 7, 20, 0.92);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(80, 180, 255, 0.45);
      z-index: 1200;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      padding: 100px 16px 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 40px;
      color: #cbebff;
      text-decoration: none;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }
    .sidebar a span:first-child { font-size: 1.3rem; width: 28px; }
    .sidebar a:hover {
      background: rgba(80, 180, 255, 0.2);
      color: white;
      transform: translateX(6px);
      letter-spacing: 0.3px;
    }
    .sidebar a.active {
      background: linear-gradient(95deg, #1a3c5a30, #0d2b4530);
      border-left: 3px solid #6bc2ff;
      color: #dcf5ff;
      font-weight: 600;
    }

    .sidebar-socials {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid rgba(80, 180, 255, 0.3);
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    .social-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(20, 40, 60, 0.6);
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      text-decoration: none;
      color: #b3e0ff;
    }
    .social-icon svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
    .social-icon:hover {
      transform: translateY(-3px);
      background: #2a6ca3;
      color: white;
      box-shadow: 0 0 12px #4fa2e0;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(3px);
      z-index: 1150;
      display: none;
    }
    .sidebar-overlay.active { display: block; }

    .main-content {
      position: relative;
      z-index: 10;
      margin-top: 70px;
      height: calc(100vh - 70px);
      overflow-y: auto;
      padding: 28px 32px 50px 32px;
      scroll-behavior: smooth;
      animation: fadeSlideUp 0.5s ease-out;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: url('https://i.ibb.co/rff7H2Sq/file-00000000ed5071f48a86ac3926cd0030.png') no-repeat right center;
      background-size: cover;
      border-radius: 32px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(110,210,255,0.2);
      transition: transform 0.2s ease;
    }
    .hero-section:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 40px -12px rgba(0,0,0,0.7), 0 0 0 1px rgba(110,210,255,0.4);
    }
    .hero-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #03050be6 0%, #03050b80 50%, transparent 100%);
      pointer-events: none;
    }
    .hero-left {
      flex: 1.2;
      padding: 48px 40px;
      position: relative;
      z-index: 2;
      min-width: 260px;
    }
    .hero-right {
      flex: 0.8;
      min-height: 280px;
      position: relative;
      z-index: 1;
    }
    .hero-left h1 {
      font-size: 3.2rem;
      font-weight: 800;
      font-family: 'Orbitron', monospace;
      background: linear-gradient(135deg, #ffffff, #9adcff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .hero-left p {
      font-size: 1.2rem;
      opacity: 0.85;
      margin-bottom: 32px;
      max-width: 500px;
      line-height: 1.5;
    }
    .hero-btn {
      background: linear-gradient(105deg, #2a6ca3, #0e4a70);
      border: none;
      padding: 14px 34px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(0,160,255,0.3);
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.5px;
    }
    .hero-btn:hover {
      transform: scale(1.03);
      background: linear-gradient(105deg, #3a80b5, #1a5a85);
      box-shadow: 0 6px 18px rgba(0,200,255,0.4);
    }
    @media (max-width: 780px) {
      .hero-section {
        flex-direction: column;
        background-position: center 30%;
      }
      .hero-section::before {
        background: linear-gradient(135deg, #03050be6 0%, #03050bcc 100%);
      }
      .hero-left {
        padding: 40px 28px;
        text-align: center;
      }
      .hero-left p {
        margin-left: auto;
        margin-right: auto;
      }
      .hero-right {
        min-height: 160px;
        width: 100%;
      }
      .hero-left h1 {
        font-size: 2.2rem;
      }
    }

    .dashboard-cards, .planets-grid, .market-grid, .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      margin-top: 28px;
    }
    .card {
      background: rgba(15, 22, 40, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(90, 170, 255, 0.3);
      border-radius: 32px;
      padding: 22px;
      transition: all 0.3s ease;
      box-shadow: 0 16px 28px -12px rgba(0, 0, 0, 0.5);
    }
    .card:hover {
      border-color: #7ac8ff;
      transform: translateY(-5px);
      background: rgba(28, 40, 68, 0.85);
    }

    .team-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: block;
      object-fit: cover;
      border: 2px solid #6bc2ff;
      box-shadow: 0 0 12px rgba(107,194,255,0.3);
    }
    .team-name {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      font-family: 'Orbitron', monospace;
      margin-bottom: 6px;
    }
    .team-role {
      text-align: center;
      color: #9adcff;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .team-bio {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .team-socials {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
    }
    .team-socials a {
      color: #b3e0ff;
      transition: 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .team-socials a:hover {
      color: #ffffff;
      transform: translateY(-2px);
    }
    .team-x-icon {
      font-size: 1.3rem;
    }
    .team-tg-text {
      font-size: 0.9rem;
      background: rgba(30, 60, 90, 0.5);
      padding: 4px 12px;
      border-radius: 40px;
      letter-spacing: 0.3px;
    }

    .whitepaper-container {
      max-width: 900px;
      margin: 0 auto;
    }
    .whitepaper-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .whitepaper-header h1 {
      font-size: 2.8rem;
      font-family: 'Orbitron', monospace;
      background: linear-gradient(135deg, #ffffff, #9adcff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }
    .whitepaper-header p {
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .whitepaper-section {
      background: rgba(15, 22, 40, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 28px;
      margin-bottom: 32px;
      border: 1px solid rgba(90, 170, 255, 0.2);
    }
    .whitepaper-section h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #ceecff;
    }
    .whitepaper-section h3 {
      font-size: 1.3rem;
      margin: 20px 0 12px 0;
      color: #9adcff;
    }
    .whitepaper-section p {
      line-height: 1.6;
      margin-bottom: 16px;
      opacity: 0.9;
    }
    .whitepaper-section ul {
      margin-left: 24px;
      margin-bottom: 16px;
    }
    .whitepaper-section li {
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .btn-whitepaper {
      display: inline-block;
      background: linear-gradient(105deg, #2a6ca3, #0e4a70);
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      margin-top: 12px;
    }
    .btn-whitepaper:hover {
      transform: translateY(-2px);
      background: linear-gradient(105deg, #3a80b5, #1a5a85);
      box-shadow: 0 6px 18px rgba(0,200,255,0.3);
    }

    #planetDescInput {
      background: #0a1022cc;
      border: 1px solid #2f6c9e;
      border-radius: 48px;
      padding: 20px 24px;
      width: 100%;
      color: #f0fcff;
      font-size: 1.2rem;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      transition: 0.2s;
      min-height: 80px;
      resize: vertical;
    }
    #planetDescInput:focus {
      border-color: #7ac8ff;
      box-shadow: 0 0 0 3px #2f8eff40;
    }

    .nft-name-input, .nft-desc-textarea {
      background: #0a1022cc;
      border: 1px solid #2f6c9e;
      border-radius: 48px;
      padding: 14px 20px;
      width: 100%;
      color: #f0fcff;
      font-size: 1rem;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      transition: 0.2s;
      margin-bottom: 20px;
    }
    .nft-name-input:focus, .nft-desc-textarea:focus {
      border-color: #7ac8ff;
      box-shadow: 0 0 0 3px #2f8eff40;
    }
    .nft-desc-textarea {
      border-radius: 32px;
      min-height: 80px;
      resize: vertical;
    }

    #generatePlanetBtn, #addGeneratedPlanetBtn {
      padding: 16px 32px;
      font-size: 1.2rem;
      font-weight: 700;
      min-width: 220px;
    }
    #generatePlanetBtn {
      background: linear-gradient(105deg, #2a6ca3, #0e4a70);
      border: 1px solid #6bc2ff;
    }
    #generatePlanetBtn:hover {
      transform: scale(1.02);
      background: linear-gradient(105deg, #3a80b5, #1a5a85);
    }
    @media (max-width: 680px) {
      #generatePlanetBtn, #addGeneratedPlanetBtn {
        width: 100%;
        padding: 14px 20px;
        font-size: 1rem;
        min-width: unset;
      }
      .flex-between {
        flex-direction: column;
      }
    }

    .animation-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.4);
      padding: 8px 16px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      font-size: 0.85rem;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 26px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #1c2f44;
      transition: 0.3s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2a6ca3;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .help-center-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .ai-assistant-section {
      background: rgba(15, 22, 40, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 24px;
      margin-bottom: 40px;
      border: 1px solid rgba(90, 170, 255, 0.3);
    }
    .ai-assistant-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .ai-assistant-header span {
      font-size: 2rem;
    }
    .ai-assistant-header h2 {
      font-size: 1.8rem;
      margin-bottom: 0;
    }
    .chat-messages {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      padding: 20px;
      height: 320px;
      overflow-y: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-bubble {
      background: rgba(30, 50, 70, 0.8);
      padding: 10px 16px;
      border-radius: 20px;
      line-height: 1.4;
      font-size: 0.95rem;
    }
    .message.user .message-bubble {
      background: linear-gradient(105deg, #1b5080, #0e3560);
    }
    .message-avatar {
      width: 32px;
      height: 32px;
      background: #2a6ca3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .chat-input-area {
      display: flex;
      gap: 12px;
    }
    .chat-input-area input {
      flex: 1;
      background: #0a1022cc;
      border: 1px solid #2f6c9e;
      border-radius: 48px;
      padding: 12px 20px;
      color: white;
    }
    .chat-input-area button {
      background: #1b5080;
      border: none;
      padding: 12px 24px;
      border-radius: 48px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .chat-input-area button:hover {
      background: #2a6ca3;
    }

    .faq-section {
      background: rgba(15, 22, 40, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 24px;
      border: 1px solid rgba(90, 170, 255, 0.3);
    }
    .faq-item {
      border-bottom: 1px solid rgba(90, 170, 255, 0.2);
      margin-bottom: 8px;
    }
    .faq-question {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .faq-question:hover {
      color: #9adcff;
    }
    .faq-question .icon {
      font-size: 1.2rem;
      transition: transform 0.2s;
    }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      padding: 0 8px;
      opacity: 0.8;
      line-height: 1.5;
    }
    .faq-item.open .faq-answer {
      max-height: 300px;
      padding-bottom: 16px;
    }
    .faq-item.open .faq-question .icon {
      transform: rotate(45deg);
    }

    h2 {
      font-size: 2rem;

          } else if (cat === 'nature') {

      function analyzePrompt(prompt) {
        const lower = prompt.toLowerCase();
        const detected = new Set();
        for (let [cat, keywords] of Object.entries(categories)) {
          for (let kw of keywords) {
            if (lower.includes(kw)) { detected.add(cat); break; }
          }
        }
        if (detected.size === 0) return ['default'];
        return Array.from(detected).slice(0, 3);

        if (category === 'default') return 'anim-default';

      }
      let currentAnimations = [], animEnabled = true;

        if (!element) return;

      }

        if (!element) return;

        classesToAdd.forEach(cls => { element.classList.add(cls); currentAnimations.push(cls); });
      }
      window.AnimationEngine = { applyAnimationsToImage, setEnabled: (enabled) => { animEnabled = enabled; }, isEnabled: () => animEnabled };

        return {
          imageData: data.image,
          name: planetName,
          description: shortDesc,
          fullName: finalName,
          fullDesc: finalDesc,
          type: "AI Generated",
          rarity: "Varies",
          emoji: randomEmoji,
          aiGenerated: true,
          failed: false
        };
      } catch(error) {
        console.error(error);
        return { imageData: null, name: planetName, description: shortDesc, emoji: randomEmoji, failed: true };
      }
    }
    
    async function addNewPlanet(planet) {
      if(!planet||!planet.name||planet.failed) return false;
      myPlanets.push(planet);
      addActivity(`🪐 AI-generated planet minted: ${planet.name} ${planet.emoji}`);
      if(currentSection==="myPlanets") renderMyPlanetsView();
      if(currentSection==="dashboard") renderDashboardView();
      return true;
    }
