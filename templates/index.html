<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Astira — AI Planet Studio | Help Center</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap');

    body {
      font-family: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
      background: #03050b;
      color: #f0f3fc;
      overflow: hidden;
      position: relative;
    }

    /* Cosmic animated background (behind everything) */
    .cosmic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      animation: starDrift 80s linear infinite;
    }
    .star {
      position: absolute;
      background: rgba(255, 240, 200, 0.8);
      border-radius: 50%;
      box-shadow: 0 0 6px #fff8e0;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 1; transform: scale(1.2);}
    }
    @keyframes starDrift {
      0% { transform: translate(0, 0);}
      100% { transform: translate(-5%, -5%);}
    }

    .orbiting-planet {
      position: absolute;
      border-radius: 50%;
      filter: blur(2px);
      opacity: 0.25;
      animation: floatPlanet 25s infinite ease-in-out;
    }
    @keyframes floatPlanet {
      0% { transform: translate(0, 0) scale(1);}
      50% { transform: translate(3%, 2%) scale(1.02);}
      100% { transform: translate(0, 0) scale(1);}
    }

    .planet-1 { width: 180px; height: 180px; background: radial-gradient(circle at 30% 30%, #ffb347, #8b4513); top: 15%; left: -60px; box-shadow: 0 0 40px #ffae42; animation-duration: 40s; }
    .planet-2 { width: 260px; height: 260px; background: radial-gradient(circle at 40% 60%, #6a9eff, #1b3b6b); bottom: -80px; right: -70px; opacity: 0.2; filter: blur(8px); animation-duration: 55s; }
    .planet-3 { width: 120px; height: 120px; background: radial-gradient(circle, #bd7acf, #4a2a6b); top: 60%; left: 70%; opacity: 0.3; filter: blur(3px); animation-duration: 30s; }
    .nebula {
      position: absolute;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(80,150,255,0.08), transparent);
      border-radius: 50%;
      top: 20%;
      left: 50%;
      filter: blur(60px);
      animation: nebulaPulse 18s infinite alternate;
    }
    @keyframes nebulaPulse {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 0.5; transform: scale(1.2);}
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(8, 12, 24, 0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(110, 210, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 1100;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      font-family: 'Orbitron', monospace;
    }

    .hamburger {
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
      color: #9adcff;
      transition: 0.2s;
      width: 44px;
      height: 44px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hamburger:hover {
      background: rgba(154, 220, 255, 0.2);
      text-shadow: 0 0 6px #6bc2ff;
      transform: scale(1.02);
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 2px;
    }
    .logo-astira {
      background: linear-gradient(135deg, #e0f0ff, #89c9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px #2f8eff60;
    }
    .logo-diamond {
      color: #6bc2ff;
      font-size: 1.6rem;
      font-weight: 400;
    }
    .logo-ai {
      background: linear-gradient(135deg, #ffffff, #b3dbff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .right-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .connect-wallet-btn {
      background: linear-gradient(105deg, #1a4f6e, #0f3850);
      border: 1px solid #6bc2ff;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Space Grotesk', sans-serif;
      white-space: nowrap;
    }
    .connect-wallet-btn:hover {
      background: #2a6ca3;
      transform: scale(1.02);
      box-shadow: 0 0 12px #4fa2e0;
    }

    .profile-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(145deg, #16212e, #09101c);
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border: 1px solid #6bc2ff;
      cursor: pointer;
      transition: 0.2s;
    }
    .profile-icon:hover {
      border-color: #aafff0;
      box-shadow: 0 0 10px #4fa2e0;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 290px;
      background: rgba(3, 7, 20, 0.92);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(80, 180, 255, 0.45);
      z-index: 1200;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      padding: 100px 20px 30px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 1.18rem;
      font-weight: 500;
      padding: 12px 18px;
      border-radius: 40px;
      color: #cbebff;
      text-decoration: none;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }
    .sidebar a span:first-child { font-size: 1.5rem; width: 34px; }
    .sidebar a:hover {
      background: rgba(80, 180, 255, 0.2);
      color: white;
      transform: translateX(6px);
      letter-spacing: 0.5px;
    }
    .sidebar a.active {
      background: linear-gradient(95deg, #1a3c5a30, #0d2b4530);
      border-left: 3px solid #6bc2ff;
      color: #dcf5ff;
      font-weight: 600;
    }

    .sidebar-socials {
      margin-top: auto;
      padding-top: 28px;
      border-top: 1px solid rgba(80, 180, 255, 0.3);
      display: flex;
      justify-content: center;
      gap: 32px;
    }
    .social-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(20, 40, 60, 0.6);
      backdrop-filter: blur(4px);
      font-size: 1.5rem;
      transition: all 0.2s ease;
      text-decoration: none;
      color: #b3e0ff;
    }
    .social-icon:hover {
      transform: translateY(-3px);
      background: #2a6ca3;
      color: white;
      box-shadow: 0 0 12px #4fa2e0;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(3px);
      z-index: 1150;
      display: none;
    }
    .sidebar-overlay.active { display: block; }

    /* Main content */
    .main-content {
      position: relative;
      z-index: 10;
      margin-top: 70px;
      height: calc(100vh - 70px);
      overflow-y: auto;
      padding: 28px 32px 50px 32px;
      scroll-behavior: smooth;
      animation: fadeSlideUp 0.5s ease-out;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero section (unchanged) */
    .hero-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: url('https://i.ibb.co/rff7H2Sq/file-00000000ed5071f48a86ac3926cd0030.png') no-repeat right center;
      background-size: cover;
      border-radius: 32px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(110,210,255,0.2);
      transition: transform 0.2s ease;
    }
    .hero-section:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 40px -12px rgba(0,0,0,0.7), 0 0 0 1px rgba(110,210,255,0.4);
    }
    .hero-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #03050be6 0%, #03050b80 50%, transparent 100%);
      pointer-events: none;
    }
    .hero-left {
      flex: 1.2;
      padding: 48px 40px;
      position: relative;
      z-index: 2;
      min-width: 260px;
    }
    .hero-right {
      flex: 0.8;
      min-height: 280px;
      position: relative;
      z-index: 1;
    }
    .hero-left h1 {
      font-size: 3.2rem;
      font-weight: 800;
      font-family: 'Orbitron', monospace;
      background: linear-gradient(135deg, #ffffff, #9adcff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .hero-left p {
      font-size: 1.2rem;
      opacity: 0.85;
      margin-bottom: 32px;
      max-width: 500px;
      line-height: 1.5;
    }
    .hero-btn {
      background: linear-gradient(105deg, #2a6ca3, #0e4a70);
      border: none;
      padding: 14px 34px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(0,160,255,0.3);
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.5px;
    }
    .hero-btn:hover {
      transform: scale(1.03);
      background: linear-gradient(105deg, #3a80b5, #1a5a85);
      box-shadow: 0 6px 18px rgba(0,200,255,0.4);
    }
    @media (max-width: 780px) {
      .hero-section {
        flex-direction: column;
        background-position: center 30%;
      }
      .hero-section::before {
        background: linear-gradient(135deg, #03050be6 0%, #03050bcc 100%);
      }
      .hero-left {
        padding: 40px 28px;
        text-align: center;
      }
      .hero-left p {
        margin-left: auto;
        margin-right: auto;
      }
      .hero-right {
        min-height: 160px;
        width: 100%;
      }
      .hero-left h1 {
        font-size: 2.2rem;
      }
    }

    /* Cards, grids, etc. (shared) */
    .dashboard-cards, .planets-grid, .market-grid, .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      margin-top: 28px;
    }
    .card {
      background: rgba(15, 22, 40, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(90, 170, 255, 0.3);
      border-radius: 32px;
      padding: 22px;
      transition: all 0.3s ease;
      box-shadow: 0 16px 28px -12px rgba(0, 0, 0, 0.5);
    }
    .card:hover {
      border-color: #7ac8ff;
      transform: translateY(-5px);
      background: rgba(28, 40, 68, 0.85);
    }

    /* Team card specific */
    .team-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: block;
      object-fit: cover;
      border: 2px solid #6bc2ff;
      box-shadow: 0 0 12px rgba(107,194,255,0.3);
    }
    .team-name {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      font-family: 'Orbitron', monospace;
      margin-bottom: 6px;
    }
    .team-role {
      text-align: center;
      color: #9adcff;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .team-bio {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .team-socials {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
    }
    .team-socials a {
      color: #b3e0ff;
      transition: 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .team-socials a:hover {
      color: #ffffff;
      transform: translateY(-2px);
    }
    .team-x-icon {
      font-size: 1.3rem;
    }
    .team-tg-text {
      font-size: 0.9rem;
      background: rgba(30, 60, 90, 0.5);
      padding: 4px 12px;
      border-radius: 40px;
      letter-spacing: 0.3px;
    }

    /* Whitepaper page styles */
    .whitepaper-container {
      max-width: 900px;
      margin: 0 auto;
    }
    .whitepaper-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .whitepaper-header h1 {
      font-size: 2.8rem;
      font-family: 'Orbitron', monospace;
      background: linear-gradient(135deg, #ffffff, #9adcff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }
    .whitepaper-header p {
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .whitepaper-section {
      background: rgba(15, 22, 40, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 28px;
      margin-bottom: 32px;
      border: 1px solid rgba(90, 170, 255, 0.2);
    }
    .whitepaper-section h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #ceecff;
    }
    .whitepaper-section h3 {
      font-size: 1.3rem;
      margin: 20px 0 12px 0;
      color: #9adcff;
    }
    .whitepaper-section p {
      line-height: 1.6;
      margin-bottom: 16px;
      opacity: 0.9;
    }
    .whitepaper-section ul {
      margin-left: 24px;
      margin-bottom: 16px;
    }
    .whitepaper-section li {
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .btn-whitepaper {
      display: inline-block;
      background: linear-gradient(105deg, #2a6ca3, #0e4a70);
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      margin-top: 12px;
    }
    .btn-whitepaper:hover {
      transform: translateY(-2px);
      background: linear-gradient(105deg, #3a80b5, #1a5a85);
      box-shadow: 0 6px 18px rgba(0,200,255,0.3);
    }

    /* LARGER INPUT FIELD FOR CREATE PLANET */
    #planetDescInput {
      background: #0a1022cc;
      border: 1px solid #2f6c9e;
      border-radius: 48px;
      padding: 20px 24px;
      width: 100%;
      color: #f0fcff;
      font-size: 1.2rem;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      transition: 0.2s;
      min-height: 80px;
      resize: vertical;
    }
    #planetDescInput:focus {
      border-color: #7ac8ff;
      box-shadow: 0 0 0 3px #2f8eff40;
    }

    #generatePlanetBtn, #addGeneratedPlanetBtn {
      padding: 16px 32px;
      font-size: 1.2rem;
      font-weight: 700;
      min-width: 220px;
    }
    #generatePlanetBtn {
      background: linear-gradient(105deg, #2a6ca3, #0e4a70);
      border: 1px solid #6bc2ff;
    }
    #generatePlanetBtn:hover {
      transform: scale(1.02);
      background: linear-gradient(105deg, #3a80b5, #1a5a85);
    }
    @media (max-width: 680px) {
      #generatePlanetBtn, #addGeneratedPlanetBtn {
        width: 100%;
        padding: 14px 20px;
        font-size: 1rem;
        min-width: unset;
      }
      .flex-between {
        flex-direction: column;
      }
    }

    /* ========== HELP CENTER SPECIFIC STYLES ========== */
    .help-center-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .ai-assistant-section {
      background: rgba(15, 22, 40, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 24px;
      margin-bottom: 40px;
      border: 1px solid rgba(90, 170, 255, 0.3);
    }
    .ai-assistant-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .ai-assistant-header span {
      font-size: 2rem;
    }
    .ai-assistant-header h2 {
      font-size: 1.8rem;
      margin-bottom: 0;
    }
    .chat-messages {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      padding: 20px;
      height: 320px;
      overflow-y: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-bubble {
      background: rgba(30, 50, 70, 0.8);
      padding: 10px 16px;
      border-radius: 20px;
      line-height: 1.4;
      font-size: 0.95rem;
    }
    .message.user .message-bubble {
      background: linear-gradient(105deg, #1b5080, #0e3560);
    }
    .message-avatar {
      width: 32px;
      height: 32px;
      background: #2a6ca3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .chat-input-area {
      display: flex;
      gap: 12px;
    }
    .chat-input-area input {
      flex: 1;
      background: #0a1022cc;
      border: 1px solid #2f6c9e;
      border-radius: 48px;
      padding: 12px 20px;
      color: white;
    }
    .chat-input-area button {
      background: #1b5080;
      border: none;
      padding: 12px 24px;
      border-radius: 48px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .chat-input-area button:hover {
      background: #2a6ca3;
    }

    /* FAQ Accordion */
    .faq-section {
      background: rgba(15, 22, 40, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 24px;
      border: 1px solid rgba(90, 170, 255, 0.3);
    }
    .faq-item {
      border-bottom: 1px solid rgba(90, 170, 255, 0.2);
      margin-bottom: 8px;
    }
    .faq-question {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .faq-question:hover {
      color: #9adcff;
    }
    .faq-question .icon {
      font-size: 1.2rem;
      transition: transform 0.2s;
    }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      padding: 0 8px;
      opacity: 0.8;
      line-height: 1.5;
    }
    .faq-item.open .faq-answer {
      max-height: 300px;
      padding-bottom: 16px;
    }
    .faq-item.open .faq-question .icon {
      transform: rotate(45deg);
    }

    h2 {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Orbitron', monospace;
      background: linear-gradient(125deg, #ffffff, #b3dbff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    h3 {
      font-size: 1.4rem;
      font-weight: 600;
      font-family: 'Orbitron', monospace;
      margin-bottom: 12px;
      color: #ceecff;
    }
    .info-note {
      background: rgba(255, 200, 100, 0.1);
      border-left: 3px solid #ffb347;
      padding: 12px 20px;
      border-radius: 20px;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .planet-image-card img {
      width: 100%;
      border-radius: 28px;
      object-fit: cover;
      aspect-ratio: 1/1;
    }
    .badge-coming-soon {
      background: rgba(255, 180, 70, 0.2);
      border: 1px solid #ffb347;
      border-radius: 60px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #ffd966;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .generated-preview {
      margin-top: 28px;
      background: #091020cc;
      border-radius: 36px;
      padding: 24px;
      border: 1px dashed #6bc2ff;
    }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .coming-soon-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      background: rgba(10, 18, 34, 0.5);
      border-radius: 48px;
      padding: 48px 24px;
    }
    .coming-soon-title {
      font-size: 2.5rem;
      font-family: 'Orbitron', monospace;
      background: linear-gradient(135deg, #ffd966, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }
    .coming-soon-message {
      font-size: 1.2rem;
      opacity: 0.8;
      max-width: 500px;
      margin-bottom: 32px;
    }
    .loader {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #6bc2ff;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message {
      background: rgba(255, 80, 80, 0.2);
      border: 1px solid #ff6666;
      border-radius: 24px;
      padding: 20px;
      text-align: center;
    }

    @media (max-width: 680px) {
      .top-bar {
        padding: 0 16px;
      }
      .logo-area {
        font-size: 1.4rem;
        gap: 4px;
      }
      .logo-diamond {
        font-size: 1.2rem;
      }
      .connect-wallet-btn {
        padding: 6px 12px;
        font-size: 0.7rem;
      }
      .profile-icon {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
      .right-controls {
        gap: 8px;
      }
      .message {
        max-width: 95%;
      }
    }
  </style>
</head>
<body>

<!-- Cosmic background -->
<div class="cosmic-bg">
  <div class="stars" id="starfield"></div>
  <div class="orbiting-planet planet-1"></div>
  <div class="orbiting-planet planet-2"></div>
  <div class="orbiting-planet planet-3"></div>

<div class="top-bar">

  <div class="logo-area">

    <span class="logo-diamond">✦</span>
    <span class="logo-ai">AI</span>
  </div>

    <button id="connectWalletBtn" class="connect-wallet-btn">🔌 Connect Wallet</button>
    <div class="profile-icon">🌙</div>

</div>

<div id="sidebarOverlay" class="sidebar-overlay"></div>
<aside id="sidebar" class="sidebar">
  <nav>
    <a href="#" data-section="dashboard" class="nav-link active"><span>🌌</span><span>Dashboard</span></a>
    <a href="#" data-section="createPlanet" class="nav-link"><span>🪐</span><span>Create Planet</span></a>
    <a href="#" data-section="myPlanets" class="nav-link"><span>🌠</span><span>My Planets</span></a>
    <a href="#" data-section="marketplace" class="nav-link"><span>🛒</span><span>Marketplace</span></a>
    <a href="#" data-section="activity" class="nav-link"><span>🔔</span><span>Activity</span></a>
    <a href="#" data-section="team" class="nav-link"><span>👥</span><span>Team</span></a>
    <a href="#" data-section="whitepaper" class="nav-link"><span>📄</span><span>Whitepaper</span></a>
    <a href="#" data-section="help" class="nav-link"><span>❓</span><span>Help Center</span></a>
  </nav>
  <div class="sidebar-socials">
    <a href="https://x.com/astira_web3" target="_blank" class="social-icon" aria-label="X (Twitter)">𝕏</a>
    <a href="https://t.me/astiraweb3" target="_blank" class="social-icon" aria-label="Telegram">✈️</a>
  </div>
</aside>

<main id="appMain" class="main-content">
  <div id="dynamicView">Loading Astira...</div>
</main>

<script>
  // ========== FULLY CORRECTED JS WITH DOMContentLoaded ==========
  document.addEventListener("DOMContentLoaded", function() {
    console.log("✅ JS loaded – DOM ready");

    // ***** UPDATED PLANET IMAGES (15 planets) *****
    const CUSTOM_PLANETS = [
      { name: "Ignarion", emoji: "🔥", type: "Fire Planet", rarity: "Rare", description: "A blazing world covered in molten oceans and erupting volcanoes.", imageData: "https://i.ibb.co/Wpprv92S/file-0000000082f4720a8e324b704b7fa33f.png" },
      { name: "Verdyra", emoji: "🌿", type: "Nature Planet", rarity: "Uncommon", description: "A vibrant world filled with endless forests, glowing vegetation.", imageData: "https://i.ibb.co/hJbKCP0V/file-00000000271c7243adbdab4bb0fd7198.png" },
      { name: "Cryonix", emoji: "❄️", type: "Ice Planet", rarity: "Rare", description: "A frozen world of endless glaciers and crystal storms.", imageData: "https://postimg.cc/VS5T0f0R" },
      { name: "Solvaris", emoji: "☀️", type: "Desert Planet", rarity: "Uncommon", description: "A scorching world of endless dunes and blazing suns.", imageData: "https://i.postimg.cc/m2TpXVcZ/file-00000000c8347243b313707c839a3e4d.png" },
      { name: "Terranova", emoji: "🌍", type: "Earth-like Planet", rarity: "Common", description: "A balanced and habitable world with oceans and forests.", imageData: "https://i.postimg.cc/NFCXxg9s/file-0000000088e071f4a38b674b96724918.png" },
      { name: "Pyronox", emoji: "🌋", type: "Volcanic Planet", rarity: "Rare", description: "A dark and unstable world dominated by active volcanoes.", imageData: "https://i.postimg.cc/9XsZzfh1/file-00000000c45471f4b1804b339a61a154.png" },
      { name: "Gravion", emoji: "🪨", type: "Rocky Planet", rarity: "Common", description: "A dense, heavy world with powerful gravity and rugged terrain.", imageData: "https://i.postimg.cc/s28DKvw1/file-00000000311071f4b675afc6b6c59f5d.png" },
      { name: "Aqualis Prime", emoji: "🌊", type: "Water Planet", rarity: "Rare", description: "A vast ocean world where deep blue waters cover nearly the entire surface.", imageData: "https://i.postimg.cc/13fkBMTz/file-00000000bf4471f494e465dcce23961b.png" },
      { name: "Heliora", emoji: "✨", type: "Energy Planet", rarity: "Epic", description: "A radiant world powered by pure energy, streams of light across its surface.", imageData: "https://i.postimg.cc/T1NkWvTN/file-000000007cbc72469880782e40456670.png" },
      { name: "Ignis Rex", emoji: "🔥", type: "Ringed Fire Planet", rarity: "Epic", description: "A dominant volcanic world surrounded by a blazing ring of debris.", imageData: "https://i.postimg.cc/g0pKj2vz/file-00000000c70871f4be9c05b82f4421c5.png" },
      { name: "Drakonis", emoji: "🐉", type: "Molten Core Planet", rarity: "Epic", description: "A fierce, fractured world with glowing magma veins running across its surface.", imageData: "https://i.postimg.cc/Y9HngxYx/file-00000000ed7c720a8d3af0568fb515cc.png" },
      { name: "Voltaris", emoji: "⚡", type: "Storm/Electric Planet", rarity: "Epic", description: "A chaotic world surrounded by constant lightning storms.", imageData: "https://i.postimg.cc/zv3nRLt5/file-00000000e4c0720aa0fc22d47e152f15.png" },
      { name: "Nebulon", emoji: "🌌", type: "Cosmic/Gas Planet", rarity: "Legendary", description: "A mysterious planet formed from swirling cosmic gases and nebula energy.", imageData: "https://i.postimg.cc/rzXKFzvK/file-00000000a12c7246bbf2eba55df79b6a.png" },
      { name: "Gaialux", emoji: "🌱", type: "Life Planet", rarity: "Legendary", description: "A radiant world overflowing with advanced life forms and bioluminescent ecosystems.", imageData: "https://i.postimg.cc/ZKSNSMZJ/file-00000000bf047243a9c13e188e2fd9c9.png" },
      { name: "Cindros", emoji: "🔥", type: "Burning Core Planet", rarity: "Legendary", description: "A volatile world with an exposed, blazing core visible from the surface.", imageData: "https://i.postimg.cc/h4rDXyTD/file-000000009f24720a8457f4d129b860b4.png" }
    ];

    let myPlanets = [];
    let currentSection = "dashboard";
    let lastGeneratedPlanet = null;

    function initPlanets() {
      myPlanets = CUSTOM_PLANETS.map(p => ({ ...p, aiGenerated: false, imageData: p.imageData }));
    }

    async function generatePlanetFromDescription(prompt) {
      console.log("🔵 generatePlanetFromDescription called with prompt:", prompt);
      if (!prompt || !prompt.trim()) prompt = "mysterious cosmic sphere";
      const cleanPrompt = prompt.trim();

      let planetName = cleanPrompt.split(' ').slice(0, 2).join(' ');
      if (planetName.length < 3) planetName = cleanPrompt.slice(0, 20);
      planetName = planetName.charAt(0).toUpperCase() + planetName.slice(1).substring(0, 24);
      const emojiList = ["🪐", "🌍", "🌕", "🔮", "🌊", "🔥", "❄️", "💎", "🌀", "✨"];
      const randomEmoji = emojiList[Math.floor(Math.random() * emojiList.length)];
      const shortDesc = cleanPrompt.length > 70 ? cleanPrompt.slice(0, 67) + "…" : cleanPrompt;

      try {
        const response = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: cleanPrompt })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (!data.image) throw new Error('Invalid response: missing image URL');
        return {
          imageData: data.image,
          name: planetName,
          description: shortDesc,
          type: "AI Generated",
          rarity: "Varies",
          emoji: randomEmoji,
          aiGenerated: true,
          failed: false
        };
      } catch (error) {
        console.error("❌ Generation failed:", error);
        return {
          imageData: null,
          name: planetName,
          description: shortDesc,
          type: "Unknown",
          rarity: "Unknown",
          emoji: randomEmoji,
          aiGenerated: false,
          failed: true
        };
      }
  }
  
async function addNewPlanet(planet) {
      if (!planet || !planet.name || planet.failed) return false;
      myPlanets.push(planet);
      addActivity(`🪐 AI-generated planet minted: ${planet.name} ${planet.emoji}`);
      if (currentSection === "myPlanets") renderMyPlanetsView();
      if (currentSection === "dashboard") renderDashboardView();
      return true;
    }

    // Team data (unchanged)
    const TEAM_MEMBERS = [
      { name: "Astira", role: "CEO & Founder", bio: "Visionary behind the project, defining direction, purpose, and long-term goals.", avatar: "https://i.ibb.co/bMz81nMn/IMG-20260421-122500-468.jpg", twitter: "https://x.com/astira_web3", telegramUsername: "@Astira_web3", telegramLink: "https://t.me/Astira_web3" },
      { name: "Bob", role: "Community Manager", bio: "Leads community development and engagement efforts.", avatar: "https://i.ibb.co/LdsRxcjr/IMG-20260421-122540-947.jpg", twitter: "https://x.com/bobbyd_great?s=11", telegramUsername: "@bobbythe_great", telegramLink: "https://t.me/bobbythe_great" },
      { name: "Tom", role: "Project Promotion Manager", bio: "Oversees strategic promotion and growth of the project.", avatar: "https://i.ibb.co/bMz81nMn/IMG-20260421-122500-468.jpg", twitter: "https://x.com/astira_tom3?s=11", telegramUsername: "@astiraTom", telegramLink: "https://t.me/astiraTom" },
      { name: "Croix", role: "Poster Designer", bio: "Creative mind behind visual identity and promotional graphics.", avatar: "https://i.ibb.co/G438tLCp/IMG-20260421-122548-698.jpg", twitter: "https://x.com/croixonchain?s=11", telegramUsername: "@croixonchain", telegramLink: "https://t.me/croixonchain" },
      { name: "Zaidra", role: "Website Developer", bio: "Responsible for design, development, and maintenance of the web application.", avatar: "https://i.ibb.co/VW7yTczx/file-000000001c6072468f1da8c287dade13.png", twitter: "https://x.com/zaidra_", telegramUsername: "@zaidrax", telegramLink: "https://t.me/zaidrax" }
    ];

    function getAIResponse(userMessage) {
      const msg = userMessage.toLowerCase();
      if (msg.includes("create planet") || msg.includes("generate")) return "Go to 'Create Planet' tab, describe your planet, and click 'Generate AI Planet'.";
      if (msg.includes("nft") || msg.includes("mint")) return "NFT minting is coming soon in Phase 2.";
      return "I can answer questions about Astira, planet creation, and the roadmap. Please ask something specific!";
    }

    function renderHelpCenterView() {
      const html = `<div class="help-center-container"><div class="ai-assistant-section"><div class="ai-assistant-header"><span>🤖</span><h2>Astira AI Assistant</h2></div><div class="chat-messages" id="chatMessages"><div class="message assistant"><div class="message-avatar">🤖</div><div class="message-bubble">Hello! Ask me anything.</div></div></div><div class="chat-input-area"><input type="text" id="chatInput" placeholder="Type your question..."><button id="sendChatBtn">Send</button></div></div><div class="faq-section"><h2>❓ FAQ</h2><div class="faq-list" id="faqList"></div></div></div>`;
      document.getElementById("dynamicView").innerHTML = html;
      const faqList = document.getElementById("faqList");
      if (faqList) {
        const faqs = [{ q: "What is Astira?", a: "Astira is an AI-powered NFT platform for planet NFTs." }, { q: "How do I create a planet?", a: "Go to 'Create Planet', describe it, and click 'Generate AI Planet'." }];
        faqs.forEach(faq => {
          const item = document.createElement("div");
          item.className = "faq-item";
          item.innerHTML = `<div class="faq-question"><span>${faq.q}</span><span class="icon">+</span></div><div class="faq-answer">${faq.a}</div>`;
          faqList.appendChild(item);
        });
        document.querySelectorAll(".faq-item").forEach(item => { const q = item.querySelector(".faq-question"); q?.addEventListener("click", () => item.classList.toggle("open")); });
      }
      const chatInput = document.getElementById("chatInput"), sendBtn = document.getElementById("sendChatBtn"), chatMessages = document.getElementById("chatMessages");
      function addMessage(text, isUser = false) {
        if (!chatMessages) return;
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${isUser ? "user" : "assistant"}`;
        msgDiv.innerHTML = isUser ? `<div class="message-avatar">👤</div><div class="message-bubble">${text}</div>` : `<div class="message-avatar">🤖</div><div class="message-bubble">${text}</div>`;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
      function handleUserMessage() {
        const userText = chatInput?.value.trim();
        if (!userText) return;
        addMessage(userText, true);
        const aiReply = getAIResponse(userText);
        setTimeout(() => addMessage(aiReply, false), 100);
        if (chatInput) chatInput.value = "";
      }
      sendBtn?.addEventListener("click", handleUserMessage);
      chatInput?.addEventListener("keypress", (e) => { if (e.key === "Enter") handleUserMessage(); });
    }

    function renderDashboardView() {
      const featured = myPlanets.slice(0, 6);
      const heroHTML = `<div class="hero-section"><div class="hero-left"><h1>Forge Your Cosmic Legacy</h1><p>Create, evolve, and explore unique planets powered by AI.</p><button class="hero-btn" id="heroCreateBtn">✨ Create Planet</button></div><div class="hero-right"></div></div>`;
      const restHTML = `<div><div class="welcome-narrative"><h2>✦ Astira · Your Digital Universe ✦</h2><p>Astira is an NFT creation and trading platform built around the theme of "planets."</p></div><h3>🌟 Featured Worlds (Sample)</h3><div class="dashboard-cards">${featured.map(planet => `<div class="card"><div class="planet-image-card"><img src="${planet.imageData}" alt="${planet.name}"></div><h3>${planet.name} ${planet.emoji}</h3><p><strong>${planet.type}</strong> · ${planet.rarity}</p><p>${planet.description}</p><div class="badge-coming-soon">🔒 NFT Feature Soon</div></div>`).join('')}</div></div>`;
      document.getElementById("dynamicView").innerHTML = heroHTML + restHTML;
      const heroBtn = document.getElementById("heroCreateBtn");
      if (heroBtn) heroBtn.addEventListener("click", () => switchToSection("createPlanet"));
    }

    function renderCreatePlanetView() {
      const html = `<div><h2>🪐 AI Planet Forge (Flask + ModelsLab)</h2><p>Describe your dream planet — our AI will generate a unique image.</p><div style="margin:28px 0;"><input type="text" id="planetDescInput" placeholder="e.g., 'A crimson desert planet'"><div class="flex-between"><button id="generatePlanetBtn" class="btn btn-primary">✨ Generate AI Planet</button><button id="addGeneratedPlanetBtn" class="btn" disabled>🔒 Mint to My Planets (Coming Soon)</button></div></div><div id="generatedResultPlaceholder" class="generated-preview"><div style="text-align:center;">✨ Image will appear here ✨</div></div></div>`;
      document.getElementById("dynamicView").innerHTML = html;
      const generateBtn = document.getElementById("generatePlanetBtn"), descInput = document.getElementById("planetDescInput"), container = document.getElementById("generatedResultPlaceholder");
      if (!generateBtn || !descInput || !container) return;
      let isGenerating = false;
      async function updatePreview() {
        const description = descInput.value.trim();
        if (!description) return alert("Please describe your planet.");
        if (isGenerating) return;
        isGenerating = true;
        generateBtn.disabled = true;
        generateBtn.innerHTML = '<div class="loader"></div> Generating...';
        container.innerHTML = `<div style="text-align:center;"><div class="loader"></div><p>AI is painting your world...</p></div>`;
        try {
          const generated = await generatePlanetFromDescription(description);
          if (!generated || !generated.imageData) {
            container.innerHTML = `<div class="error-message"><div style="font-size:1.5rem;">❌ GENERATION FAILED</div><p>Could not generate image. Check console.</p></div>`;
          } else {
            lastGeneratedPlanet = generated;
            container.innerHTML = `<div style="display:flex; flex-wrap:wrap; gap:28px; align-items:center;"><img src="${generated.imageData}" style="width:180px; height:180px; border-radius:50%; box-shadow:0 0 25px #6bc2ff; object-fit:cover;"><div><div style="font-size:3rem;">${generated.emoji}</div><strong style="font-size:1.6rem;">${generated.name}</strong><p>${generated.description}</p><div class="badge-coming-soon">🔒 Minting disabled (Coming Soon)</div></div></div>`;
          }
        } catch (err) { console.error(err); container.innerHTML = `<div class="error-message">❌ Error: ${err.message}</div>`; }
        finally { isGenerating = false; generateBtn.disabled = false; generateBtn.innerHTML = '✨ Generate AI Planet'; }
      }
      generateBtn.addEventListener("click", updatePreview);
    }

    function renderMyPlanetsView() {
      if (!myPlanets.length) { document.getElementById("dynamicView").innerHTML = `<div><h2>🌠 My Planets</h2><div class="card">No planets yet. Use 'Create Planet'.</div></div>`; return; }
      const html = `<div><h2>🌠 My Planet Collection (${myPlanets.length} worlds)</h2><div class="planets-grid">${myPlanets.map(p => `<div class="card"><div class="planet-image-card"><img src="${p.imageData}" alt="${p.name}"></div><h3>${p.name} ${p.emoji}</h3><p><strong>${p.type}</strong> · ${p.rarity}</p><p>${p.description}</p><div class="badge-coming-soon">🔒 Trade / Mint (Soon)</div></div>`).join('')}</div></div>`;
      document.getElementById("dynamicView").innerHTML = html;
    }

    function renderMarketplaceView() { document.getElementById("dynamicView").innerHTML = `<div class="coming-soon-container"><div class="coming-soon-title">🚧 NFT Marketplace</div><div class="coming-soon-message">Coming soon</div></div>`; }
    function renderActivityView() { document.getElementById("dynamicView").innerHTML = `<div class="coming-soon-container"><div class="coming-soon-title">📡 Activity Feed</div><div class="coming-soon-message">Coming soon</div></div>`; }
    function renderTeamView() {
      const teamCards = TEAM_MEMBERS.map(m => `<div class="card"><img src="${m.avatar}" alt="${m.name}" class="team-avatar"><div class="team-name">${m.name}</div><div class="team-role">${m.role}</div><div class="team-bio">${m.bio}</div><div class="team-socials"><a href="${m.twitter}" target="_blank" class="team-x-icon">𝕏</a><a href="${m.telegramLink}" target="_blank" class="team-tg-text">${m.telegramUsername}</a></div></div>`).join('');
      document.getElementById("dynamicView").innerHTML = `<div><h2>👥 Meet the Astira Team</h2><div class="team-grid">${teamCards}</div></div>`;
    }
    function renderWhitepaperView() {
      document.getElementById("dynamicView").innerHTML = `<div class="whitepaper-container"><div class="whitepaper-header"><h1>📄 Astira Whitepaper</h1><button id="fullWhitepaperBtn" class="btn-whitepaper">📖 Read Full Whitepaper</button></div></div>`;
      const btn = document.getElementById("fullWhitepaperBtn");
      if (btn) btn.addEventListener("click", () => window.open("https://pdflink.to/1dd62a96/", "_blank"));
    }

    let activityLog = [{ text: "🚀 Astira AI online — connected to Flask backend.", timestamp: new Date() }];
    function addActivity(message) { activityLog.unshift({ text: message, timestamp: new Date() }); if (currentSection === "activity") renderActivityView(); }

    // Navigation
    function closeSidebar() { document.getElementById("sidebar")?.classList.remove("open"); document.getElementById("sidebarOverlay")?.classList.remove("active"); }
    function openSidebar() { document.getElementById("sidebar")?.classList.add("open"); document.getElementById("sidebarOverlay")?.classList.add("active"); }
    function toggleSidebar() { const s = document.getElementById("sidebar"); s?.classList.contains("open") ? closeSidebar() : openSidebar(); }
    function setActiveNavLink(sectionId) { document.querySelectorAll('.nav-link').forEach(link => { const ls = link.getAttribute('data-section'); if (ls === sectionId) link.classList.add('active'); else link.classList.remove('active'); }); }
    function switchToSection(sectionId) {
      currentSection = sectionId; setActiveNavLink(sectionId);
      if (sectionId === "dashboard") renderDashboardView();
      else if (sectionId === "createPlanet") renderCreatePlanetView();
      else if (sectionId === "myPlanets") renderMyPlanetsView();
      else if (sectionId === "marketplace") renderMarketplaceView();
      else if (sectionId === "activity") renderActivityView();
      else if (sectionId === "team") renderTeamView();
      else if (sectionId === "whitepaper") renderWhitepaperView();
      else if (sectionId === "help") renderHelpCenterView();
      closeSidebar();
    }

    function handleConnectWallet() { alert("🔮 Wallet connection coming soon!"); }
    function generateStars() {
      const starContainer = document.getElementById('starfield');
      if (!starContainer) return;
      for (let i = 0; i < 280; i++) {
        const star = document.createElement('div'); star.classList.add('star');
        const size = 1 + Math.random() * 3;
        star.style.width = `${size}px`; star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`; star.style.top = `${Math.random() * 100}%`;
        star.style.animationDelay = `${Math.random() * 5}s`; star.style.animationDuration = `${2 + Math.random() * 4}s`;
        starContainer.appendChild(star);
      }
    }
    generateStars();

    function init() {
      initPlanets();
      renderDashboardView();
      currentSection = "dashboard";
      setActiveNavLink("dashboard");
      document.getElementById("hamburgerBtn")?.addEventListener("click", (e) => { e.stopPropagation(); toggleSidebar(); });
      document.getElementById("sidebarOverlay")?.addEventListener("click", closeSidebar);
      document.querySelectorAll(".nav-link").forEach(link => { link.addEventListener("click", (e) => { e.preventDefault(); const section = link.getAttribute("data-section"); if (section) switchToSection(section); }); });
      window.addEventListener("resize", () => { if (window.innerWidth > 1000) closeSidebar(); });
      const walletBtn = document.getElementById("connectWalletBtn");
      if (walletBtn) walletBtn.addEventListener("click", handleConnectWallet);
    }
    init();
  });
</script>
</body>
</html>
